<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}} · gmeta</title>
    <meta name="description" content="gmeta project documentation generated from the canonical spec markdown files.">
    <link rel="stylesheet" href="{{root}}assets/style.css">
    <script>
      (() => {
        const stored = localStorage.getItem('gmeta-theme');
        document.documentElement.dataset.theme = stored || 'system';
      })();
    </script>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-main">
          <a class="brand" href="{{root}}index.html">gmeta</a>
          <p class="tagline">Git metadata specification and project docs</p>
          <nav class="nav">
            {{nav}}
          </nav>
        </div>
        <div class="sidebar-footer">
          <div class="theme-control" aria-label="Theme switcher">
            <button type="button" class="theme-icon-button" data-theme-value="light" aria-label="Use light theme" title="Light theme">
              <span aria-hidden="true">☀️</span>
            </button>
            <button type="button" class="theme-icon-button" data-theme-value="dark" aria-label="Use dark theme" title="Dark theme">
              <span aria-hidden="true">🌙</span>
            </button>
          </div>
          <button type="button" class="sidebar-toggle" aria-label="Collapse sidebar" title="Collapse sidebar">
            <span class="collapse-icon" aria-hidden="true">◧</span>
          </button>
        </div>
      </aside>
      <main class="content">
        <header class="page-header">
          <div class="page-header-main">
            <div class="eyebrow">Generated from <a href="https://github.com/git-meta/git-meta/tree/main/spec"><code>spec/*.md</code></a></div>
            <h1>{{title}}</h1>
          </div>
        </header>
        <article class="doc-content{{content_class}}">
          {{content}}
        </article>
      </main>
    </div>
    <script>
      (() => {
        const root = document.documentElement;
        const sidebar = document.querySelector('.sidebar');
        const themeButtons = document.querySelectorAll('.theme-icon-button');
        const sidebarToggle = document.querySelector('.sidebar-toggle');
        const media = window.matchMedia('(prefers-color-scheme: dark)');

        function currentTheme() {
          return localStorage.getItem('gmeta-theme') || 'system';
        }

        function applyTheme(theme) {
          root.dataset.theme = theme;
          const effective = theme === 'system' ? (media.matches ? 'dark' : 'light') : theme;
          themeButtons.forEach((button) => {
            button.classList.toggle('active', button.dataset.themeValue === effective);
          });
        }

        function currentSidebarState() {
          return localStorage.getItem('gmeta-sidebar') || 'expanded';
        }

        function applySidebarState(state) {
          const collapsed = state === 'collapsed';
          sidebar.classList.toggle('collapsed', collapsed);
          document.body.classList.toggle('sidebar-collapsed', collapsed);
          sidebarToggle.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
          sidebarToggle.setAttribute('aria-label', collapsed ? 'Expand sidebar' : 'Collapse sidebar');
        }

        themeButtons.forEach((button) => {
          button.addEventListener('click', () => {
            localStorage.setItem('gmeta-theme', button.dataset.themeValue);
            applyTheme(button.dataset.themeValue);
          });
        });

        sidebarToggle.addEventListener('click', () => {
          const next = currentSidebarState() === 'collapsed' ? 'expanded' : 'collapsed';
          localStorage.setItem('gmeta-sidebar', next);
          applySidebarState(next);
        });

        media.addEventListener?.('change', () => {
          if (currentTheme() === 'system') {
            applyTheme('system');
          }
        });

        applyTheme(currentTheme());
        applySidebarState(currentSidebarState());
      })();
    </script>
  </body>
</html>
